<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>D&D 5e — Fiche</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0f;--surface:#16181d;--surface2:#1e2128;--surface3:#252830;--border:#2e3240;--text:#e8e6e0;--text2:#a8a49e;--text3:#5a5870;--cp:#c8a84b;--cglow:rgba(200,168,75,.18);--F:'Cinzel',serif;--B:'Crimson Pro',serif}
.th-Barbare{--cp:#e05a2b;--cglow:rgba(224,90,43,.18)}.th-Barde{--cp:#9b59b6;--cglow:rgba(155,89,182,.18)}.th-Clerc{--cp:#f0c040;--cglow:rgba(240,192,64,.18)}.th-Druide{--cp:#4caf50;--cglow:rgba(76,175,80,.18)}.th-Guerrier{--cp:#e53935;--cglow:rgba(229,57,53,.18)}.th-Moine{--cp:#80cbc4;--cglow:rgba(128,203,196,.18)}.th-Paladin{--cp:#ffd54f;--cglow:rgba(255,213,79,.18)}.th-Rôdeur{--cp:#66bb6a;--cglow:rgba(102,187,106,.18)}.th-Roublard{--cp:#546e7a;--cglow:rgba(84,110,122,.18)}.th-Ensorceleur{--cp:#e91e63;--cglow:rgba(233,30,99,.18)}.th-Occultiste{--cp:#7e57c2;--cglow:rgba(126,87,194,.18)}.th-Magicien{--cp:#42a5f5;--cglow:rgba(66,165,245,.18)}.th-Artificier{--cp:#ff7043;--cglow:rgba(255,112,67,.18)}
body{background:var(--bg);color:var(--text);font-family:var(--B);font-size:14px;min-height:100vh}
#app{max-width:920px;margin:0 auto;padding:12px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;flex-wrap:wrap;gap:8px}
.hdr-title{font-family:var(--F);font-size:16px;color:var(--cp);letter-spacing:.08em}
.hdr-char{font-size:13px;color:var(--text2);flex:1;text-align:center}
.pbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ptag{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s}
.ptag.on{border-color:var(--cp);color:var(--cp);background:var(--surface2);box-shadow:0 0 6px var(--cglow)}
.ptag-add{border-style:dashed}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:6px 13px;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2);font-family:var(--B);transition:all .15s}
.tab.on{border-color:var(--cp);color:var(--cp);background:var(--surface2);box-shadow:0 0 8px var(--cglow)}
.tab.lvlup{border-color:#ffd54f;color:#ffd54f;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(255,213,79,.3)}50%{box-shadow:0 0 14px rgba(255,213,79,.7)}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.pt{font-family:var(--F);font-size:13px;color:var(--cp);letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--B);font-size:13px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--cp)}.fi:disabled{opacity:.5;cursor:not-allowed}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.mt8{margin-top:8px}.mb6{margin-bottom:6px}.mb10{margin-bottom:10px}
.sb{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center}
.sb.hi{border-color:var(--cp);box-shadow:0 0 8px var(--cglow)}
.sn{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:4px}
.sv{width:100%;text-align:center;font-size:22px;font-weight:600;background:transparent;border:none;color:var(--text);outline:none;padding:0}
.sm{font-size:13px;font-weight:500;color:var(--cp);margin-top:2px}
.hp-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin:4px 0}
.hp-fill{height:100%;border-radius:3px;transition:width .3s}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2);font-family:var(--B);transition:all .15s}
.btn:hover{border-color:var(--cp);color:var(--cp)}.btn:disabled{opacity:.4;cursor:not-allowed}
.bac{background:var(--cp)!important;color:#1a1400!important;border-color:var(--cp)!important;font-weight:600}
.bac:hover{opacity:.85}.bdanger{background:#b71c1c!important;color:#fff!important;border-color:#b71c1c!important}
.bsm{padding:3px 8px;font-size:11px}
.sk{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px}
.sk-dot{width:12px;height:12px;border-radius:50%;border:1px solid var(--border);flex-shrink:0}
.sk-dot.p{background:var(--cp);border-color:var(--cp)}.sk-dot.e{background:var(--cp);border-color:var(--cp);box-shadow:0 0 0 2px var(--cp)}
.sk-n{flex:1;font-size:13px;color:var(--text2)}.sk-n.cs{color:var(--cp)}
.sk-ab{font-size:10px;color:var(--text3);width:28px}.sk-v{font-size:13px;font-weight:600;color:var(--text);width:32px;text-align:right}
.save-btn{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;margin-bottom:4px}
.save-btn:hover{border-color:var(--cp)}
.save-dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--border)}
.save-dot.p{background:var(--cp);border-color:var(--cp)}
.acw{position:relative}
.acd{position:absolute;z-index:100;width:100%;background:var(--surface2);border:1px solid var(--cp);border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;display:none}
.aci{padding:8px 12px;cursor:pointer;transition:background .1s}.aci:hover{background:var(--surface3)}
.ain{font-size:13px;color:var(--text);font-weight:600}.ais{font-size:11px;color:var(--text3);margin-top:2px}
.eq-layout{display:grid;grid-template-columns:1fr 170px 1fr;gap:8px;margin-bottom:10px}
.eq-col{display:flex;flex-direction:column;gap:6px}
.eq-slot{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:all .15s;min-height:50px;display:flex;flex-direction:column;justify-content:center}
.eq-slot:hover{border-color:var(--cp)}.eq-slot.filled{border-color:var(--cp);background:var(--surface3)}
.eq-slot-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.eq-slot-item{font-size:12px;color:var(--cp);font-weight:600;margin-top:2px}
.eq-slot-empty{font-size:11px;color:var(--text3);font-style:italic}
.eq-portrait{width:100%;aspect-ratio:3/4;border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface3);transition:border-color .15s}
.eq-portrait:hover{border-color:var(--cp)}.eq-portrait img{width:100%;height:100%;object-fit:cover}
.eq-portrait-hint{font-size:10px;color:var(--text3);text-align:center;padding:8px}
.inv-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:5px}
.coin{text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 4px}
.coin-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.coin-val{font-size:16px;font-weight:600;background:transparent;border:none;width:100%;text-align:center;outline:none;color:var(--text)}
.xp-bar-wrap{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;margin:6px 0}
.xp-bar-fill{height:100%;background:var(--cp);border-radius:4px;transition:width .4s}
.xp-reward{padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;text-align:center;font-size:12px;margin-bottom:4px}
.xp-reward:hover{border-color:var(--cp);color:var(--cp)}
.sort-row{background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;overflow:hidden}
.sort-head{display:flex;align-items:center;padding:8px 10px;cursor:pointer;transition:background .15s}
.sort-head:hover{background:var(--surface3)}
.sort-body{display:none;padding:8px 12px 10px;border-top:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.6}
.sort-body.open{display:block}
.feat-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;overflow:hidden}
.feat-head{display:flex;align-items:center;padding:8px 10px;cursor:pointer;transition:background .15s}
.feat-head:hover{background:var(--surface3)}
.feat-body{display:none;padding:8px 12px 10px;border-top:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.6}
.feat-body.open{display:block}
.fc{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 32px 10px 10px;margin-bottom:6px}
.ds-circle{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all .15s;display:inline-block}
.ds-circle.s{background:#4caf50;border-color:#4caf50}.ds-circle.f{background:#e53935;border-color:#e53935}
#modal{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7)}
#modal.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--cp);border-radius:12px;padding:18px;max-width:520px;width:92%;max-height:85vh;overflow-y:auto}
.dice-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s}
.dice-btn:hover{border-color:var(--cp);color:var(--cp)}
.slot-bubble{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:inline-block;margin:2px;transition:all .15s}
.slot-bubble.used{background:var(--cp);border-color:var(--cp)}
.ai-panel{background:var(--surface2);border:1px solid var(--cp);border-radius:8px;padding:12px;margin-top:10px}
.ai-output{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;max-height:320px;overflow-y:auto}
.hp-ctrl{display:flex;gap:6px;align-items:center;margin-top:6px}
/* STATUS BADGES */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;margin:3px;border:1px solid var(--border)}
.status-badge.bonus{border-color:#4caf50;background:rgba(76,175,80,.1);color:#4caf50}
.status-badge.malus{border-color:#e53935;background:rgba(229,57,53,.1);color:#e53935}
.status-badge.neutral{border-color:var(--cp);background:var(--cglow);color:var(--cp)}
/* PROFICIENCY */
.prof-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:6px;margin-bottom:4px;font-size:12px}
.prof-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prof-dot.yes{background:#4caf50}.prof-dot.no{background:#e53935}.prof-dot.partial{background:#ff9800}
/* CREATION */
.creation-wrap{max-width:700px;margin:0 auto}
.cp-step{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:var(--surface);color:var(--text3);transition:all .2s}
.cp-step.done{border-color:#4caf50;color:#4caf50;background:rgba(76,175,80,.1)}
.cp-step.active{border-color:var(--cp);color:var(--cp);background:var(--cglow);font-weight:600}
.crd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.crd{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s}
.crd:hover{border-color:var(--cp);transform:translateY(-2px)}.crd.selected{border-color:var(--cp);background:var(--cglow)}
.crd h3{font-family:var(--F);font-size:12px;color:var(--cp);margin-bottom:4px}
.crd p{font-size:11px;color:var(--text2);line-height:1.5}
.crd .tag{display:inline-block;background:var(--surface3);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--text3);margin-top:4px;margin-right:3px}
.smb{padding:8px 14px;border:2px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface2);color:var(--text2);font-family:var(--B);font-size:13px;transition:all .2s}
.smb.on{border-color:var(--cp);color:var(--cp);background:var(--cglow)}
.stat-row{display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface2);border-radius:8px;margin-bottom:6px;flex-wrap:wrap}
.stat-row-name{width:105px;font-size:13px;color:var(--text2)}
.stat-ctrl{display:flex;align-items:center;gap:8px}
.stat-ctrl button{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface3);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.stat-ctrl button:hover:not(:disabled){border-color:var(--cp);color:var(--cp)}.stat-ctrl button:disabled{opacity:.3;cursor:not-allowed}
.stat-val{font-size:20px;font-weight:700;color:var(--text);width:32px;text-align:center}
.sk-choice{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;margin-bottom:4px}
.sk-choice:hover:not(.disabled){border-color:var(--cp)}.sk-choice.selected{border-color:var(--cp);background:var(--cglow)}.sk-choice.disabled{opacity:.4;cursor:not-allowed}.sk-choice.from-bg{border-color:#4caf50;background:rgba(76,175,80,.08)}
.eq-opt{background:var(--surface2);border:2px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .2s;margin-bottom:6px}
.eq-opt:hover{border-color:var(--cp)}.eq-opt.selected{border-color:var(--cp);background:var(--cglow)}
.recap-stat{display:flex;justify-content:space-between;padding:4px 8px;border-radius:4px;font-size:13px}
.recap-stat:nth-child(odd){background:var(--surface2)}
.rest-btn{flex:1;padding:10px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--B);font-size:12px;color:var(--text2);transition:all .2s;text-align:center}
.rest-btn.short{border-color:#80cbc4;color:#80cbc4}.rest-btn.short:hover{background:rgba(128,203,196,.1)}
.rest-btn.long{border-color:#ffd54f;color:#ffd54f}.rest-btn.long:hover{background:rgba(255,213,79,.1)}
/* MAGIC ITEM */
.magic-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;font-size:10px;border:1px solid #9b59b6;color:#9b59b6;background:rgba(155,89,182,.1)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* LU */
.lu-choice{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.lu-choice:hover{border-color:var(--cp)}.lu-choice.selected{border-color:var(--cp);background:var(--cglow)}
.lu-choice h3{font-family:var(--F);font-size:14px;color:var(--cp);margin-bottom:4px}
.lu-choice p{font-size:12px;color:var(--text2)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="hdr-title">⚔ D&D 5e</span>
    <span class="hdr-char" id="hdrChar">Fiche de personnage</span>
    <button class="btn bsm" id="mjBtn" onclick="toggleMJ()" style="border-color:var(--cp);color:var(--cp)">🎲 MJ</button>
    <button class="btn bac bsm" onclick="saveAll()">💾 Sauvegarder</button>
  </div>
  <div class="pbar" id="playerBar"></div>
  <div class="tabs" id="tabBar"></div>
  <div id="tabContent"></div>
  <div id="modal"></div>
</div>
<script>
// ═══════════════════════════════════════
// SRD DATA
// ═══════════════════════════════════════
const POINT_BUY_COST={8:0,9:1,10:2,11:3,12:4,13:5,14:7,15:9};
const SRD={
classes:[
  {name:"Barbare",hd:"d12",hdVal:12,saves:["FOR","CON"],armor:"Légères, intermédiaires, boucliers",weapons:"Simples, de guerre",weaponTypes:["simple","guerre"],armorTypes:["légère","intermédiaire","bouclier"],skills:["Athlétisme","Intimidation","Nature","Perception","Survie","Dressage"],skillCount:2,spellcaster:false,spellWeight:0,mcProf:"Boucliers, armes courantes, armes de guerre",primaryStats:["FOR","CON"],startSpells:0,
   combatFeatures:[{name:"Rage",charges:2,recovery:"long",desc:"Bonus de dégâts, résistance aux dégâts physiques, avantage sur les jets de FOR. Dure 1 minute. Prend fin si tu n'attaques pas.",icon:"🔥"},{name:"Défense sans armure",charges:0,recovery:"passive",desc:"Sans armure, ta CA = 10 + mod DEX + mod CON.",icon:"🛡"}],
   equipment:[[{name:"Grande hache",qty:1,desc:"1d12 tranchant, lourde"},{name:"Hachette",qty:2,desc:"1d6 tranchant, légère"},{name:"Pack d'explorateur",qty:1,desc:"Sac à dos, couchage, rations"},{name:"4 javelines",qty:1,desc:"1d6 perforant, lancer"}]]},
  {name:"Barde",hd:"d8",hdVal:8,saves:["DEX","CHA"],armor:"Légères",weapons:"Simples, arbalètes main, épées longues, rapières, épées courtes",weaponTypes:["simple","rapière","épée longue","épée courte","arbalète main"],armorTypes:["légère"],skills:["Acrobaties","Arcanes","Athlétisme","Histoire","Investigation","Médecine","Nature","Perception","Représentation","Persuasion","Discrétion","Survie"],skillCount:3,spellcaster:true,spellWeight:1,mcProf:"Armure légère, une compétence, un instrument",primaryStats:["CHA","DEX"],startSpells:4,
   combatFeatures:[{name:"Inspiration bardique",charges:null,recovery:"short",desc:"Accorde 1d6 d'inspiration à un allié (portée 18m). Le dé augmente avec le niveau.",icon:"🎵",chargesFormula:"CHA"}],
   equipment:[[{name:"Rapière",qty:1,desc:"1d8 perforant, finesse"},{name:"Armure de cuir",qty:1,desc:"CA 11+DEX"},{name:"Pack du diplomate",qty:1,desc:"Coffret, parchemins"},{name:"Luth",qty:1,desc:"Focaliseur bardique"},{name:"Dague",qty:1,desc:"1d4 perforant, finesse"}]]},
  {name:"Clerc",hd:"d8",hdVal:8,saves:["SAG","CHA"],armor:"Légères, intermédiaires, boucliers",weapons:"Simples",weaponTypes:["simple"],armorTypes:["légère","intermédiaire","bouclier"],skills:["Histoire","Intuition","Médecine","Persuasion","Religion"],skillCount:2,spellcaster:true,spellWeight:1,mcProf:"Armure légère, armure intermédiaire, boucliers",primaryStats:["SAG","CON"],startSpells:4,
   combatFeatures:[{name:"Conduit divin",charges:1,recovery:"short",desc:"Canalise l'énergie divine. Effet selon domaine divin. (Renvoi des morts-vivants disponible à tous les clercs)",icon:"✝"}],
   equipment:[[{name:"Masse d'armes",qty:1,desc:"1d6 contondant"},{name:"Cotte de mailles (inter.)",qty:1,desc:"CA 14+DEX(max2)"},{name:"Bouclier",qty:1,desc:"+2 CA"},{name:"Symbole sacré",qty:1,desc:"Focaliseur divin"},{name:"Pack du prêtre",qty:1,desc:"Bougies, couverture, rations"}]]},
  {name:"Druide",hd:"d8",hdVal:8,saves:["INT","SAG"],armor:"Légères, intermédiaires, boucliers (non métal)",weapons:"Massues, dagues, fléchettes, javelines, bâtons, serpes, lances",weaponTypes:["simple"],armorTypes:["légère","intermédiaire","bouclier"],skills:["Arcanes","Dressage","Intuition","Médecine","Nature","Perception","Religion","Survie"],skillCount:2,spellcaster:true,spellWeight:1,mcProf:"Armure légère, intermédiaire, boucliers (non métal)",primaryStats:["SAG","CON"],startSpells:4,

let SPELLS_DB = null; // Sera chargé depuis spells_db.json

function getSpellsDB(){
  // Retourne SPELLS_DB si chargé, sinon SRD.spells (fallback)
  if(SPELLS_DB) return SPELLS_DB;
  return SRD.spells;
}

async function loadSpellsDB(onDone){
  // Essayer localStorage d'abord
  try {
    const cached = localStorage.getItem('dnd5e_spells_db');
    if(cached){
      const arr = JSON.parse(cached);
      SPELLS_DB = parseSpellsDB(arr);
      showToast('📚 Compendium chargé depuis le cache ('+SPELLS_DB.length+' sorts)');
      if(onDone) onDone();
      return;
    }
  } catch(e){}
  
  // Charger depuis spells_db.json
  showToast('⏳ Chargement du compendium...');
  try {
    const resp = await fetch('spells_db.json');
    if(!resp.ok) throw new Error('Fichier introuvable');
    const arr = await resp.json();
    // Mettre en cache
    try { localStorage.setItem('dnd5e_spells_db', JSON.stringify(arr)); } catch(e){}
    SPELLS_DB = parseSpellsDB(arr);
    showToast('✅ Compendium chargé ! '+SPELLS_DB.length+' sorts disponibles.');
    if(onDone) onDone();
  } catch(e){
    showToast('❌ Impossible de charger spells_db.json. Placez le fichier dans le même dossier que la fiche.');
  }
}

function parseSpellsDB(arr){
  // Convertit le format compact [nameFR, nameEN, level, school, castTime, range, components, duration, classes[], desc, ritual, rolls[]]
  return arr.map(r => ({
    name: r[0], nameEN: r[1], level: r[2], school: r[3],
    castTime: r[4], range: r[5], components: r[6], duration: r[7],
    classes: r[8], desc: r[9], ritual: !!r[10], rolls: r[11]||[],
    damage: (r[11]&&r[11][0]) ? r[11][0][0] : ''
  }));
}

function clearSpellsCache(){
  localStorage.removeItem('dnd5e_spells_db');
  SPELLS_DB = null;
  showToast('🗑️ Cache du compendium effacé.');
}

function searchSpellsDB(query, filterClass, filterLevel, filterSchool){
  const db = getSpellsDB();
  const q = query.toLowerCase().trim();
  return db.filter(s => {
    if(filterClass && !s.classes.includes(filterClass)) return false;
    if(filterLevel !== '' && filterLevel !== null && s.level !== parseInt(filterLevel)) return false;
    if(filterSchool && s.school !== filterSchool) return false;
    if(q && !s.name.toLowerCase().includes(q) && !s.nameEN.toLowerCase().includes(q)) return false;
    return true;
  });
}

function getFeatDesc(name){
  if(FEAT_DESCS[name])return FEAT_DESCS[name];
  // Recherche partielle
  const key=Object.keys(FEAT_DESCS).find(k=>name.includes(k.split(' ')[0])&&name.includes(k.split(' ')[1]||''));
  return key?FEAT_DESCS[key]:'Description non disponible dans le SRD. Consulter aidedd.org/regles/classes/ pour les détails complets.';
}
// Capacités purement de compteur/UI, déjà affichées ailleurs — exclure des features
const FEAT_EXCLUDE=[
  'Amélioration de caractéristiques',
  'Points de sorcellerie','Magie flexible',
  'Source d\'inspiration',
  'Récupération arcanique',
  'Magie de pacte',
  'Invocations occultes',        // compteur géré dans combat
  'Pacte (choix',                // choix narratif, pas de desc utile
  '1 sort mineur supplémentaire', // vague
  '2 sorts niv.',                 // entrées de grimoire magicien
];
function isFeatExcluded(name){return FEAT_EXCLUDE.some(ex=>name.startsWith(ex)||name===ex||name.includes(ex));}  

function getLevel1Features(className){
  const cd=CLASS_LEVEL_DATA[className];
  if(!cd)return[];
  const feats=cd.levelFeatures[1]||[];
  return feats.filter(f=>f&&!isFeatExcluded(f)).map(f=>({name:f,desc:getFeatDesc(f),classe:className}));
}

// Génère les capacités gagnées à un niveau précis
function getLevelFeatures(className,level){
  const cd=CLASS_LEVEL_DATA[className];
  if(!cd)return[];
  const feats=cd.levelFeatures[level]||[];
  return feats.filter(f=>f&&!isFeatExcluded(f)).map(f=>({name:f,desc:getFeatDesc(f),classe:className}));
}

function migratePlayer(p){
  if(p.classe!==undefined&&!p.classes){p.classes=p.classe?[{name:p.classe,level:p.level||1}]:[];delete p.classe;delete p.level;}
  if(!p.classes)p.classes=[];
  if(p.created===undefined)p.created=p.classes.length>0;
  if(!p.skillsLocked)p.skillsLocked={};
  if(!p.statuses)p.statuses=[];
  if(!p.combatCharges)p.combatCharges={};
  if(!p.weaponProfs)p.weaponProfs=[];
  if(!p.armorProfs)p.armorProfs=[];
  // Correction maîtrises "non-métal" → valeurs propres
  p.weaponProfs=p.weaponProfs.map(pr=>pr.replace(' non-métal','').trim()).filter(Boolean);
  p.armorProfs=p.armorProfs.map(pr=>pr.replace(' non-métal','').trim()).filter(Boolean);
  // Si un perso existant a des maîtrises vides mais une classe définie, les resynchroniser
  if(p.created&&p.classes.length&&!p.weaponProfs.length&&!p.armorProfs.length){
    p.classes.forEach(c=>{
      const d=SRD.classes.find(cl=>cl.name===c.name);
      if(d){
        p.weaponProfs=[...new Set([...p.weaponProfs,...(d.weaponTypes||[])])];
        p.armorProfs=[...new Set([...p.armorProfs,...(d.armorTypes||[])])];
      }
    });
  }
  return p;
}

// CALCULS
// ═══════════════════════════════════════
function totalLevel(p){return(p.classes||[]).reduce((s,c)=>s+c.level,0)||1;}
function pb(lvl){return Math.ceil(lvl/4)+1;}
function mod(s){return Math.floor((s-10)/2);}
function fmt(n){return n>=0?'+'+n:''+n;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mainClass(p){if(!p.classes||!p.classes.length)return null;return p.classes.reduce((a,b)=>a.level>=b.level?a:b);}
function calcSpellSlots(p){
  // L'Occultiste utilise sa propre table (gérée séparément dans l'UI)
  let e=0;
  (p.classes||[]).forEach(c=>{
    if(c.name==='Occultiste')return; // géré séparément
    const d=SRD.classes.find(cl=>cl.name===c.name);if(!d)return;
    if(c.name==='Paladin'||c.name==='Rôdeur')e+=Math.floor(c.level/2); // demi-lanceurs
    else if(d.spellWeight===1)e+=c.level;
    else if(d.spellWeight===0.5)e+=Math.floor(c.level/2);
  });
  if(e<1)return null;
  return MC_SLOT_TABLE[Math.min(e-1,19)]||null;
}
function getWarlockSlots(p){
  const wc=(p.classes||[]).find(c=>c.name==='Occultiste');
  if(!wc)return null;
  return WARLOCK_SLOT_TABLE[Math.min(wc.level-1,19)]; // [nb, niveau]
}
function checkMcReq(p,cn){const r=SRD.mcReqs[cn];if(!r)return{ok:true,msg:''};const s=p.abilities||[10,10,10,10,10,10];if(r.length===1){const ok=s[r[0][0]]>=r[0][1];return{ok,msg:ok?'':`${ABILITIES_SH[r[0][0]]} ≥ ${r[0][1]} requis (actuel: ${s[r[0][0]]})`};}if(r[2]==='or'){const ok=s[r[0][0]]>=r[0][1]||s[r[1][0]]>=r[1][1];return{ok,msg:ok?'':`${ABILITIES_SH[r[0][0]]} ≥ ${r[0][1]} OU ${ABILITIES_SH[r[1][0]]} ≥ ${r[1][1]}`};}const o1=s[r[0][0]]>=r[0][1],o2=s[r[1][0]]>=r[1][1];return{ok:o1&&o2,msg:[!o1?`${ABILITIES_SH[r[0][0]]} ≥ ${r[0][1]}`:'',!o2?`${ABILITIES_SH[r[1][0]]} ≥ ${r[1][1]}`:''].filter(Boolean).join(', ')};}
function getFinalStats(base,raceName){const rd=SRD.races.find(r=>r.name===raceName);return base.map((v,i)=>{if(!rd)return v;let b=0;if(rd.allBonus)b=rd.allBonus;else if(rd.bonuses&&rd.bonuses[i])b=rd.bonuses[i];return v+b;});}
function pointsSpent(s){return s.reduce((a,v)=>a+(POINT_BUY_COST[v]||0),0);}
// Calcul charges d'une capacité
function getChargesMax(feat,p){
  if(!feat.charges&&feat.charges!==0)return 0;
  if(feat.chargesFormula==='CHA')return Math.max(1,mod(p.abilities[5]));
  if(feat.chargesFormula==='level')return totalLevel(p);
  if(feat.chargesFormula==='level5')return totalLevel(p)*5;
  return feat.charges||0;
}
// Vérif si une arme/armure est maîtrisée
function hasProficiency(p,itemName,itemType){
  const all=[...p.weaponProfs||[],...p.armorProfs||[]];
  return all.some(pr=>pr.toLowerCase()===itemName.toLowerCase()||pr.toLowerCase()===itemType.toLowerCase()||itemName.toLowerCase().includes(pr.toLowerCase()));
}

function setTab(id){

function renderTab(){
  const el=document.getElementById('tabContent');if(!el)return;

}

const CRE_STEPS_BASE=['Race','Classe','Stats','Historique','Compétences','Équipement','Confirmation'];
const CRE_STEPS_SPELL=['Race','Classe','Stats','Historique','Compétences','Sorts','Équipement','Confirmation'];

function getCreSteps(){const cd=SRD.classes.find(c=>c.name===CS.classe);return cd&&cd.spellcaster&&cd.startSpells>0?CRE_STEPS_SPELL:CRE_STEPS_BASE;}

function tabCreation(){
  const steps=getCreSteps();
  const labels=['Race','Classe','Stats','Historique','Compétences','Sorts','Équipement','Confirmation'];
  const cur=labels[CS.step-1];
  const stepIdx=steps.indexOf(cur);
  const progress=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px">
    ${steps.map((s,i)=>`<span class="cp-step${i<stepIdx?' done':i===stepIdx?' active':''}">${i<stepIdx?'✓ ':''+(i+1)+'. '}${s}</span>${i<steps.length-1?'<span style="color:var(--text3);font-size:10px;align-self:center">›</span>':''}`).join('')}
  </div>`;
  const map={1:creStep1,2:creStep2,3:creStep3,4:creStep4,5:creStep5,6:()=>{const cd=SRD.classes.find(c=>c.name===CS.classe);return cd&&cd.spellcaster&&cd.startSpells>0?creStep6Sorts():creStep7();},7:()=>{const cd=SRD.classes.find(c=>c.name===CS.classe);return cd&&cd.spellcaster&&cd.startSpells>0?creStep7():creStep8();},8:creStep8};
  return`<div class="creation-wrap"><div class="panel"><div class="pt" style="font-size:15px">🧙 Création du personnage</div>${progress}${(map[CS.step]||creStep1)()}</div></div>`;
}

    ${CS.race?`<div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px"><div style="font-size:13px;font-weight:600;color:var(--cp)">${esc(CS.race)}</div><div style="font-size:12px;color:var(--text2);margin-top:4px">${esc((SRD.races.find(r=>r.name===CS.race)||{}).traits||'')}</div></div>`:''}

    </div>`:''}

  </div>`;
}

function creStep2(){
  const hasArchetype=CS.classe&&CLASS_LEVEL_DATA[CS.classe]&&CLASS_LEVEL_DATA[CS.classe].archetypeLevel===1;
  const archetypes=hasArchetype?(CLASS_LEVEL_DATA[CS.classe].archetypes||[]):[];

    <div class="crd-grid">${SRD.classes.map(c=>`<div class="crd${CS.classe===c.name?' selected':''}" onclick="CS.classe='${esc(c.name)}';CS.archetype=null;renderTab()"><h3>${esc(c.name)}</h3><p>${c.hd}${c.spellcaster?' • ✦ sorts':''}</p><span class="tag">JS: ${c.saves.join(', ')}</span><span class="tag" style="color:var(--cp)">${c.skillCount} comp.</span><span class="tag" style="color:#ffd54f">★ ${(c.primaryStats||[]).join(', ')}</span></div>`).join('')}</div>
    ${CS.classe?`<div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px">${(()=>{const c=SRD.classes.find(cl=>cl.name===CS.classe);return c?`<div style="font-size:13px;font-weight:600;color:var(--cp)">${esc(c.name)}</div><div style="font-size:12px;color:var(--text2);margin-top:4px">Armures: ${esc(c.armor)} • Armes: ${esc(c.weapons)}</div>`:''})()}</div>
    ${hasArchetype?`<div style="margin-top:12px"><div style="font-size:12px;font-weight:600;color:var(--cp);margin-bottom:8px">${CS.classe==='Ensorceleur'?'🔮 Choisis ton Origine draconique':'🌑 Choisis ton Mécène d\'Outremonde'} <span style="color:#e53935">*</span></div>
      <div class="crd-grid">${archetypes.map(a=>`<div class="crd${CS.archetype===a.name?' selected':''}" onclick="CS.archetype='${esc(a.name)}';renderTab()"><h3>${a.icon||''} ${esc(a.name)}</h3><p>${esc(a.desc.slice(0,80))}…</p></div>`).join('')}</div>
      ${CS.archetype?`<div style="margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px;font-size:12px;color:#4caf50">✓ ${esc(CS.archetype)} sélectionné</div>`:''}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:12px"><button class="btn" style="flex:1" onclick="CS.step=1;renderTab()">← Retour</button><button class="btn bac" style="flex:2" onclick="CS.step=3;renderTab()" ${canContinue?'':'disabled'}>Continuer → Stats</button></div>`:`<button class="btn" style="margin-top:12px" onclick="CS.step=1;renderTab()">← Retour</button>`}
  </div>`;

function creStep3(){
  const rd=SRD.races.find(r=>r.name===CS.race);const cd=SRD.classes.find(c=>c.name===CS.classe);
  let base=[...CS.baseStats];if(CS.statMethod==='dice'&&CS.diceRolls)base=[...CS.diceRolls];
  const finals=getFinalStats(base,CS.race);
  const spent=pointsSpent(CS.statMethod==='pointbuy'?CS.baseStats:[8,8,8,8,8,8]);
  const rem=27-spent;
  const hpTotal=(cd?cd.hdVal:8)+mod(finals[2]);
  return`<div>
    <div style="display:flex;gap:8px;margin-bottom:14px"><button class="smb${CS.statMethod==='pointbuy'?' on':''}" onclick="CS.statMethod='pointbuy';renderTab()">🪙 Achat de points</button><button class="smb${CS.statMethod==='dice'?' on':''}" onclick="CS.statMethod='dice';renderTab()">🎲 Lancer les dés</button></div>
    ${CS.statMethod==='pointbuy'?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px;background:var(--surface2);border-radius:8px"><span style="font-size:13px;color:var(--text2)">Points restants :</span><span style="font-size:20px;font-weight:700;color:${rem<0?'#e53935':'var(--cp)'}">${rem}</span><span style="font-size:11px;color:var(--text3)">/ 27 • valeurs 8–15</span></div>`:''}
    ${CS.statMethod==='dice'?`<div style="margin-bottom:12px"><button class="btn bac" onclick="CS.diceRolls=ABILITIES.map(()=>{const d=[1,2,3,4].map(()=>Math.ceil(Math.random()*6));d.sort((a,b)=>b-a);return d[0]+d[1]+d[2];});renderTab()">🎲 Lancer les 6 dés (4d6 garde 3)</button>${CS.diceRolls?`<span style="margin-left:10px;font-size:12px;color:var(--cp)">${CS.diceRolls.join(' — ')}</span>`:''}</div>`:''}
    ${ABILITIES.map((ab,i)=>{const v=CS.statMethod==='dice'&&CS.diceRolls?CS.diceRolls[i]:CS.baseStats[i];const rb=rd?(rd.allBonus||rd.bonuses[i]||0):0;const final=v+rb;const canInc=CS.statMethod==='pointbuy'&&v<15&&rem>=(POINT_BUY_COST[v+1]||99)-POINT_BUY_COST[v];const canDec=CS.statMethod==='pointbuy'&&v>8;const isPrio=cd&&cd.primaryStats&&cd.primaryStats.includes(ABILITIES_SH[i]);
    return`<div class="stat-row"><span class="stat-row-name">${ab}${isPrio?` <span style="color:#ffd54f;font-size:10px">★</span>`:''}</span>${CS.statMethod==='pointbuy'?`<div class="stat-ctrl"><button onclick="creStatDec(${i})" ${canDec?'':'disabled'}>−</button><span class="stat-val">${v}</span><button onclick="creStatInc(${i})" ${canInc?'':'disabled'}>+</button></div>`:`<span class="stat-val" style="margin:0 8px">${v}</span>`}<span style="font-size:12px;color:var(--cp);width:28px">${fmt(mod(v))}</span>${rb?`<span style="font-size:11px;color:#4caf50;width:50px">+${rb} race</span>`:`<span style="width:50px"></span>`}<span style="font-size:11px;color:var(--text3)">→</span><span style="font-size:16px;font-weight:700;color:var(--cp);width:28px;text-align:center">${final}</span><span style="font-size:12px;color:var(--text2)">${fmt(mod(final))}</span></div>`;}).join('')}
    <div style="margin-top:10px;padding:8px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--text2)">PV de départ estimés : <strong style="color:var(--cp)">${hpTotal}</strong></div>
    <div style="display:flex;gap:8px;margin-top:12px"><button class="btn" style="flex:1" onclick="CS.step=2;renderTab()">← Retour</button><button class="btn bac" style="flex:2" onclick="CS.step=4;renderTab()" ${CS.statMethod==='dice'&&!CS.diceRolls?'disabled':''}>Continuer → Historique</button></div>
  </div>`;
}
function creStatInc(i){const v=CS.baseStats[i];if(v>=15)return;const cost=(POINT_BUY_COST[v+1]||99)-POINT_BUY_COST[v];if(27-pointsSpent(CS.baseStats)<cost)return;CS.baseStats[i]++;renderTab();}
function creStatDec(i){if(CS.baseStats[i]<=8)return;CS.baseStats[i]--;renderTab();}

function creStep4(){
  const bg=CS.background?BACKGROUNDS.find(b=>b.name===CS.background):null;
  return`<div><p style="font-size:13px;color:var(--text2);margin-bottom:12px">L'historique t'accorde 2 compétences et des maîtrises d'outils/langues.</p>
    <div class="fl mb6">Cherche ou clique</div>
    <div class="acw mb10"><input class="fi" id="bgInputCre" placeholder="Historique..." value="${esc(CS.background||'')}" oninput="searchCreBG(this.value)" autocomplete="off"><div class="acd" id="bgDropCre"></div></div>
    <div class="crd-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr))">${BACKGROUNDS.map(b=>`<div class="crd${CS.background===b.name?' selected':''}" onclick="CS.background='${esc(b.name)}';document.getElementById('bgInputCre').value='${esc(b.name)}';document.getElementById('bgDropCre').style.display='none';renderTab()"><h3 style="font-size:11px">${esc(b.name)}</h3><p>${esc(b.skills.join(', '))}</p>${b.tools?`<span class="tag">${esc(b.tools.slice(0,20))}</span>`:''}${b.langs?`<span class="tag">+${b.langs} langue${b.langs>1?'s':''}</span>`:''}</div>`).join('')}</div>
    ${bg?`<div style="margin-top:12px;padding:12px;background:var(--surface2);border-radius:8px"><div style="font-size:13px;font-weight:600;color:var(--cp)">${esc(bg.name)}</div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">${esc(bg.desc)}</div><div style="font-size:12px;color:#4caf50">Compétences : ${bg.skills.join(', ')}</div>${bg.tools?`<div style="font-size:12px;color:var(--text2);margin-top:2px">Outils : ${esc(bg.tools)}</div>`:''}${bg.langs?`<div style="font-size:12px;color:var(--text2);margin-top:2px">Langues supplémentaires : ${bg.langs}</div>`:''}</div>
    <div style="display:flex;gap:8px;margin-top:12px"><button class="btn" style="flex:1" onclick="CS.step=3;renderTab()">← Retour</button><button class="btn bac" style="flex:2" onclick="CS.selectedSkills=[];CS.step=5;renderTab()">Continuer → Compétences</button></div>`:`<button class="btn" style="margin-top:12px" onclick="CS.step=3;renderTab()">← Retour</button>`}
  </div>`;
}
function searchCreBG(q){const drop=document.getElementById('bgDropCre');if(!drop)return;if(!q){drop.style.display='none';return;}const res=BACKGROUNDS.filter(b=>b.name.toLowerCase().includes(q.toLowerCase()));if(!res.length){drop.style.display='none';return;}drop.style.display='block';drop.innerHTML=res.map(b=>`<div class="aci" onmousedown="event.preventDefault();CS.background='${esc(b.name)}';document.getElementById('bgInputCre').value='${esc(b.name)}';document.getElementById('bgDropCre').style.display='none';renderTab()"><div class="ain">${esc(b.name)}</div><div class="ais">${esc(b.skills.join(', '))} — ${esc(b.desc)}</div></div>`).join('');}

function creStep5(){
  const cd=SRD.classes.find(c=>c.name===CS.classe);if(!cd)return'';
  const bg=BACKGROUNDS.find(b=>b.name===CS.background);const bgSk=bg?bg.skills:[];
  const max=cd.skillCount;const sel=CS.selectedSkills;
  return`<div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:8px">Choisis <strong style="color:var(--cp)">${max} compétences</strong> parmi celles de la classe ${esc(CS.classe)}.</p>
    ${bgSk.length?`<div style="padding:8px 10px;background:rgba(76,175,80,.1);border:1px solid #4caf50;border-radius:6px;margin-bottom:10px;font-size:12px;color:#4caf50">✓ Via l'historique <strong>${esc(CS.background)}</strong> : ${bgSk.join(', ')}</div>`:''}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:6px 10px;background:var(--surface2);border-radius:6px"><span style="font-size:13px;color:var(--text2)">Sélectionnées :</span><span style="font-size:18px;font-weight:700;color:var(--cp)">${sel.length}/${max}</span></div>
    ${cd.skills.map(sk=>{const isBg=bgSk.includes(sk);const isSel=sel.includes(sk);const dis=!isSel&&sel.length>=max;return`<div class="sk-choice${isBg?' from-bg':isSel?' selected':dis?' disabled':''}" onclick="${dis&&!isBg?'':'creToggleSkill(\''+sk+'\')'}"><span class="sk-dot${isBg||isSel?' p':''}"></span><span style="flex:1;font-size:13px">${esc(sk)}${isBg?' <span style="font-size:10px;color:#4caf50">(historique)</span>':''}</span>${isBg?`<span style="font-size:11px;color:#4caf50">✓</span>`:isSel?`<span style="color:var(--cp)">✓</span>`:''}</div>`;}).join('')}
    <div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Maîtrises</div><div style="font-size:12px;color:var(--text2)">Armures : ${esc(cd.armor)} • Armes : ${esc(cd.weapons)}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Sauvegardes : ${cd.saves.join(', ')}</div></div>
    <div style="display:flex;gap:8px;margin-top:12px"><button class="btn" style="flex:1" onclick="CS.step=4;renderTab()">← Retour</button><button class="btn bac" style="flex:2" onclick="creGoNext5()" ${sel.length===max?'':'disabled'}>Continuer →</button></div>
  </div>`;
}
function creToggleSkill(sk){const cd=SRD.classes.find(c=>c.name===CS.classe);if(!cd)return;const bg=BACKGROUNDS.find(b=>b.name===CS.background);if(bg&&bg.skills.includes(sk))return;const idx=CS.selectedSkills.indexOf(sk);if(idx>=0)CS.selectedSkills.splice(idx,1);else if(CS.selectedSkills.length<cd.skillCount)CS.selectedSkills.push(sk);renderTab();}
function creGoNext5(){const cd=SRD.classes.find(c=>c.name===CS.classe);if(cd&&cd.spellcaster&&cd.startSpells>0){CS.step=6;}else{CS.step=7;}renderTab();}

  const cd=SRD.classes.find(c=>c.name===CS.classe);if(!cd)return'';

  const l1Max=max-cantripCount;

    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Choisis tes sorts de départ pour ${esc(CS.classe)}.</p>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <div style="flex:1;padding:8px;background:var(--surface2);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--text3)">Sorts mineurs</div><div style="font-size:20px;font-weight:700;color:var(--cp)">${selC.length}/${cantripCount}</div></div>
      <div style="flex:1;padding:8px;background:var(--surface2);border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--text3)">Sorts niv.1</div><div style="font-size:20px;font-weight:700;color:var(--cp)">${selL1.length}/${l1Max}</div></div>

    <div style="font-size:12px;font-weight:600;color:var(--cp);margin:10px 0 6px">Sorts de niveau 1</div>
    ${SRD.spells.filter(s=>s.level===1).map(s=>{const isSel=sel.includes(s.name);const dis=!isSel&&selL1.length>=l1Max;return`<div class="sk-choice${isSel?' selected':dis?' disabled':''}" onclick="${dis?'':'creToggleSpell(\''+esc(s.name)+'\')'}"><span class="sk-dot${isSel?' p':''}"></span><span style="flex:1;font-size:13px">${esc(s.name)}</span><span style="font-size:11px;color:var(--text3)">${esc(s.school)}${s.damage?' • '+esc(s.damage):''}</span>${isSel?`<span style="color:var(--cp)">✓</span>`:''}</div>`;}).join('')}

  </div>`;
}
function creToggleSpell(name){const idx=CS.selectedSpells.indexOf(name);if(idx>=0)CS.selectedSpells.splice(idx,1);else CS.selectedSpells.push(name);renderTab();}

  const cd=SRD.classes.find(c=>c.name===CS.classe);if(!cd||!cd.equipment)return'';

    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Choisis ton équipement de départ.</p>

    <div style="display:flex;gap:8px;margin-top:12px"><button class="btn" style="flex:1" onclick="CS.step=${(()=>{const cd=SRD.classes.find(c=>c.name===CS.classe);return cd&&cd.spellcaster&&cd.startSpells>0?6:5;})()};renderTab()">← Retour</button><button class="btn bac" style="flex:2" onclick="CS.step=8;renderTab()">Continuer → Confirmation</button></div>
  </div>`;
}

function creStep8(){
  const rd=SRD.races.find(r=>r.name===CS.race);const cd=SRD.classes.find(c=>c.name===CS.classe);const bg=BACKGROUNDS.find(b=>b.name===CS.background);
  let base=[...CS.baseStats];if(CS.statMethod==='dice'&&CS.diceRolls)base=[...CS.diceRolls];
  const finals=getFinalStats(base,CS.race);const hpMax=(cd?cd.hdVal:8)+mod(finals[2]);
  const allSk=[...new Set([...(bg?bg.skills:[]),...CS.selectedSkills])];
  return`<div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Finalise ton personnage. <strong style="color:var(--cp)">Les stats seront verrouillées.</strong></p>

      <div class="fl mb6">Alignement</div><select class="fi" onchange="CS.alignment=this.value"><option value="">— Choisir —</option>${ALIGNMENTS.map(a=>`<option ${CS.alignment===a?'selected':''}>${a}</option>`).join('')}</select></div>

        ${[['Race',CS.race],['Classe',CS.classe],['Historique',CS.background],['PV max',''+hpMax],['Compétences',''+allSk.length],...(CS.selectedSpells.length?[['Sorts',''+CS.selectedSpells.length]]:[])].map(([k,v])=>`<div class="recap-stat"><span>${k}</span><span style="color:var(--cp)">${esc(v||'—')}</span></div>`).join('')}

    </div>

function confirmCreation(){
  const p=P();const rd=SRD.races.find(r=>r.name===CS.race);const cd=SRD.classes.find(c=>c.name===CS.classe);const bg=BACKGROUNDS.find(b=>b.name===CS.background);
  if(!CS.charName.trim()||!CS.race||!CS.classe)return;
  let base=[...CS.baseStats];if(CS.statMethod==='dice'&&CS.diceRolls)base=[...CS.diceRolls];
  const finals=getFinalStats(base,CS.race);
  p.charName=CS.charName.trim();p.race=CS.race;p.draconicAncestry=CS.draconicAncestry||null;p.background=CS.background||'';p.alignment=CS.alignment;
  p.classes=[{name:CS.classe,level:1}];p.abilities=[...finals];p.abilitiesLocked=true;
  const hpBase=cd?cd.hdVal:8;p.hpMax=Math.max(1,hpBase+mod(finals[2]));p.hp=p.hpMax;
  p.ac=10+mod(finals[1]);p.speed=rd?rd.speed:9;
  p.skillProf={};p.skillsLocked={};
  const bgSk=bg?bg.skills:[];
  [...new Set([...bgSk,...CS.selectedSkills])].forEach(sk=>{p.skillProf[sk]=1;p.skillsLocked[sk]=true;});
  p.languages=rd?rd.languages:'Commun';
  p.proficiencies=cd?`Armures: ${cd.armor}\nArmes: ${cd.weapons}\nSauvegardes: ${cd.saves.join(', ')}${bg&&bg.tools?'\nOutils: '+bg.tools:''}`:'' ;
  // Maîtrises armes/armures
  p.weaponProfs=cd?cd.weaponTypes||[]:[];
  p.armorProfs=cd?cd.armorTypes||[]:[];
  p.inventory=[];p.equip={};
  if(cd&&cd.equipment&&cd.equipment[CS.equipChoice]){
    cd.equipment[CS.equipChoice].forEach(item=>p.inventory.push({name:item.name,qty:item.qty||1,desc:item.desc||''}));
    const arm=cd.equipment[CS.equipChoice].find(i=>SRD.armors.find(a=>a.name===i.name));
    const wpn=cd.equipment[CS.equipChoice].find(i=>SRD.weapons.find(w=>w.name===i.name));
    if(arm)p.equip.chest={name:arm.name,desc:arm.desc||''};
    if(wpn)p.equip.mainhand={name:wpn.name,desc:wpn.desc||''};
  }
  p.spells=CS.selectedSpells.map(name=>({name}));p.spellsLocked=true;
  // Capacités de niveau 1 depuis CLASS_LEVEL_DATA
  p.features=getLevel1Features(CS.classe);
  // Archétype choisi en création (Ensorceleur, Occultiste niv.1)
  if(CS.archetype){
    const cdLu=CLASS_LEVEL_DATA[CS.classe];
    const arch=cdLu&&cdLu.archetypes?cdLu.archetypes.find(a=>a.name===CS.archetype):null;
    if(arch&&!p.features.find(f=>f.name===arch.name)){
      p.features.push({name:arch.name,desc:arch.desc,classe:CS.classe});
    }
    // Supprimer la feature "Origine d'ensorceleur (choix)..." générique si présente
    p.features=p.features.filter(f=>!f.name.includes('Origine d\'ensorceleur')&&!f.name.includes('Mécène d\'outremonde'));
  }
  p.combatCharges={};
  p.xp=0;p.created=true;state.activeTab='perso';resetCS();render();
  showToast(`🎉 ${p.charName} est prêt à l'aventure !`);
}

function quickAddStatus(idx){
  const s=STATUS_PRESETS[idx];

    name:s.name,type:s.type,stat:s.stat||'',

  });

}

function addCustomStatus(){
  const name=(document.getElementById('stName')?.value||'').trim();
  if(!name){showToast('❌ Nom requis');return;}
  const type=document.getElementById('stType')?.value||'neutral';
  const stat=document.getElementById('stStat')?.value||'';

function doShortRest(){
  const p=P();const mc=mainClass(p);const cd=mc?SRD.classes.find(c=>c.name===mc.name):null;if(!cd)return;
  const roll=Math.ceil(Math.random()*cd.hdVal)+mod(p.abilities[2]);
  const healed=Math.max(1,roll);p.hp=Math.min(p.hpMax,p.hp+healed);
  // Récupération charges repos COURT uniquement
  if(!p.combatCharges)p.combatCharges={};
  (p.classes||[]).forEach(cls=>{
    const d=SRD.classes.find(c=>c.name===cls.name);
    if(!d||!d.combatFeatures)return;
    d.combatFeatures.forEach(f=>{
      if(f.recovery==='short'){
        const max=getChargesMax(f,p);
        p.combatCharges[f.name]=max;
      }
    });
  });
  // Occultiste récupère emplacements au repos court
  if((p.classes||[]).find(c=>c.name==='Occultiste'))p.spellSlotsUsed=[];
  render();showToast(`☕ Repos court — ${cd.hd}(${roll-mod(p.abilities[2])})+CON = <strong>+${healed} PV</strong>`);
}
function doLongRest(){
  const p=P();p.hp=p.hpMax;p.spellSlotsUsed=[];
  p.deathSaves={success:0,fail:0};
  // Récupération toutes les charges
  (p.classes||[]).forEach(cls=>{const d=SRD.classes.find(c=>c.name===cls.name);if(!d||!d.combatFeatures)return;d.combatFeatures.forEach(f=>{if(f.recovery!=='passive'){if(!p.combatCharges)p.combatCharges={};const max=getChargesMax(f,p);p.combatCharges[f.name]=max;}});});
  render();showToast('🌙 Repos long — PV, sorts et charges récupérés !');
}

function cycleSkillIfAllowed(name,current,maxSkills){
  const p=P();if(!p.skillProf)p.skillProf={};
  const total=Object.values(p.skillProf).filter(v=>v>0).length;
  // En mode MJ : liberté totale. En mode joueur : bloquer si max atteint
  if(!isMJ()&&current===0&&total>=maxSkills){
    showToast('❌ Maximum de compétences atteint.');return;
  }
  // Permettre la progression : 0→1 (maîtrise), 1→2 (expertise), 2→0 (retirer)
  p.skillProf[name]=((p.skillProf[name]||0)+1)%3;
  render();
}

function rollCustomDmg(dice,name){
  const m=dice.match(/(\d+)d(\d+)([+-]\d+)?/);
  if(!m){showToast(`🎲 ${name} : dés non reconnus`);return;}
  let total=0;const rolls=[];
  for(let i=0;i<parseInt(m[1]);i++){const r=Math.ceil(Math.random()*parseInt(m[2]));rolls.push(r);total+=r;}
  if(m[3])total+=parseInt(m[3]);
  showToast(`<strong>${name}</strong> : [${rolls.join('+')}]${m[3]||''} = <strong style="font-size:16px;color:var(--cp)">${total}</strong>`);
  if(diceOpen)renderDicePanel();
}

function useCombatCharge(name,max){const p=P();if(!p.combatCharges)p.combatCharges={};const cur=p.combatCharges[name]!==undefined?p.combatCharges[name]:max;if(cur<=0){showToast('❌ Plus de charges disponibles !');return;}p.combatCharges[name]=cur-1;render();}
function recoverCombatCharge(name,max){const p=P();if(!p.combatCharges)p.combatCharges={};p.combatCharges[name]=max;render();}
function toggleDraconicBreath(){const p=P();if(!p.combatCharges)p.combatCharges={};if(p.combatCharges['SouffleDraconique'])delete p.combatCharges['SouffleDraconique'];else p.combatCharges['SouffleDraconique']=true;saveAll();render();}
function toggleSlot(ni,si,total){const p=P();if(!p.spellSlotsUsed)p.spellSlotsUsed=[];const u=p.spellSlotsUsed[ni]||0;p.spellSlotsUsed[ni]=u>si?u-1:Math.min(total,u+1);render();}
function toggleWarlockSlot(si,total){const p=P();if(!p.spellSlotsUsed)p.spellSlotsUsed=[];const u=p.spellSlotsUsed[9]||0;p.spellSlotsUsed[9]=u>si?u-1:Math.min(total,u+1);render();}
function toggleKi(idx,max){const p=P();if(!p.combatCharges)p.combatCharges={};const cur=p.combatCharges['Ki']!==undefined?p.combatCharges['Ki']:max;p.combatCharges['Ki']=idx<cur?idx:Math.min(max,idx+1);render();}
function toggleSorcPts(idx,max){const p=P();if(!p.combatCharges)p.combatCharges={};const cur=p.combatCharges['SorcelleriePts']!==undefined?p.combatCharges['SorcelleriePts']:max;p.combatCharges['SorcelleriePts']=idx<cur?idx:Math.min(max,idx+1);render();}
function sorcCreateSlot(niv,cout,max){const p=P();if(!p.combatCharges)p.combatCharges={};const cur=p.combatCharges['SorcelleriePts']!==undefined?p.combatCharges['SorcelleriePts']:max;if(cur<cout){showToast('❌ Pas assez de points ('+cout+' requis)');return;}p.combatCharges['SorcelleriePts']=cur-cout;if(!p.spellSlotsUsed)p.spellSlotsUsed=[];p.spellSlotsUsed[niv-1]=Math.max(0,(p.spellSlotsUsed[niv-1]||1)-1);render();showToast('✓ Emplacement niv.'+niv+' créé (−'+cout+' pts)');}
function rollAttack(name,bonus,dmg){const atk=Math.ceil(Math.random()*20);const t=atk+bonus;let txt=`<strong>${name}</strong>: d20(${atk})+${bonus}=<strong>${t}</strong>`;if(atk===20){const s=parseInt(dmg)||6;txt+=` 🎉 CRITIQUE! ${Math.ceil(Math.random()*s)+Math.ceil(Math.random()*s)} dégâts`;}else if(atk===1){txt+=` 💀 FUMBLE`;}else{const m=dmg.match(/(\d+)d(\d+)([+-]\d+)?/);if(m){let tot=0;for(let i=0;i<parseInt(m[1]);i++)tot+=Math.ceil(Math.random()*parseInt(m[2]));if(m[3])tot+=parseInt(m[3]);txt+=` — Dégâts: <strong>${tot}</strong>`;}}const el=document.getElementById('rollResult');if(el){el.style.display='block';el.innerHTML=txt;}}
function rollDie(d){const n=parseInt(d.replace('d',''));const r=Math.ceil(Math.random()*n);const el=document.getElementById('rollResult');if(el){el.style.display='block';el.innerHTML=`${d}: <strong>${r}</strong>`;}}
function rollSave(ab,m){const r=Math.ceil(Math.random()*20);showToast(`JS ${ab}: d20(${r}) ${fmt(m)} = <strong>${r+m}</strong>${r===20?' 🎉':r===1?' 💀':''}`);}
function findSpellData(name){
  // Cherche dans SPELLS_DB d'abord, puis SRD.spells
  if(SPELLS_DB){
    const found = SPELLS_DB.find(s=>s.name===name||s.nameEN===name);
    if(found) return found;
  }
  const srd = SRD.spells.find(s=>s.name===name);
  if(srd) return srd;
  return null;
}

// Classes qui préparent leurs sorts (les autres les "connaissent" → toujours prêts)
const PREP_CASTERS=['Magicien','Clerc','Druide','Paladin','Artificier'];

function isPrepCaster(p){
  return (p.classes||[]).some(c=>PREP_CASTERS.includes(c.name));
}

// combatOnly=true → n'affiche que cantrips + sorts préparés (pour l'onglet Combat)
function renderSpellList(p, combatOnly){
  const spells = p.spells||[];
  if(!spells.length)return`<div style="font-size:12px;color:var(--text3);font-style:italic;padding:8px">Aucun sort enregistré.</div>`;
  const prepCaster = isPrepCaster(p);
  const byLvl={};
  spells.forEach(s=>{
    const data=findSpellData(s.name);
    const lv=data?data.level:(s.level||0);
    // En mode combat, on filtre : cantrips toujours visibles, niveaux 1+ seulement si préparé (ou classe "connaît")
    if(combatOnly && lv>0 && prepCaster && !s.prepared) return;
    if(!byLvl[lv])byLvl[lv]=[];
    byLvl[lv].push({...s,data,stableId:'spl_'+s.name.replace(/[^a-zA-Z0-9]/g,'_')});
  });
  if(!Object.keys(byLvl).length)return`<div style="font-size:12px;color:var(--text3);font-style:italic;padding:8px">Aucun sort préparé.</div>`;
  return Object.keys(byLvl).sort((a,b)=>a-b).map(lv=>`
    <div style="margin-bottom:10px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border)">${lv==='0'?'⭐ Sorts mineurs':'✦ Niveau '+lv}</div>
      ${byLvl[lv].map(s=>{
        const d=s.data;
        const school=d?d.school:'';
        const castTime=d?d.castTime:'';
        const range=d?d.range:'';
        const duration=d?d.duration:'';
        const components=d?d.components:'';
        const desc=d?d.desc:'';
        const damage=d?d.damage:'';
        const ritual=d&&d.ritual;
        const rolls=d&&d.rolls?d.rolls:[];
        const lvi=parseInt(lv);
        const isPrepared=s.prepared||lvi===0||!prepCaster;
        return`
        <div class="sort-row">
          <div class="sort-head" onclick="document.getElementById('${s.stableId}').classList.toggle('open')">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600;${!isPrepared?'color:var(--text3)':''}">${esc(s.name)}${ritual?' <span style="font-size:10px;color:var(--cp)">(R)</span>':''}${isPrepared&&lvi>0&&prepCaster?'  <span style="font-size:9px;background:rgba(76,175,80,.15);color:#4caf50;border-radius:8px;padding:1px 5px">Préparé</span>':''}</div>
              ${d?`<div style="font-size:11px;color:var(--text3)">${esc(school)}${castTime?' • '+esc(castTime):''}${range?' • '+esc(range):''}</div>`:''}
            </div>
            ${damage?`<span style="font-size:11px;color:var(--cp);margin-right:6px">${esc(damage)}</span>`:''}
            ${!combatOnly&&prepCaster&&lvi>0?`<button class="btn bsm" style="margin-right:6px;${isPrepared?'background:rgba(76,175,80,.15);color:#4caf50;border-color:#4caf50':''}" onclick="event.stopPropagation();togglePrepareSpell('${esc(s.name)}')">${isPrepared?'✓ Prêt':'Préparer'}</button>`:''}
            <span style="color:var(--text3)">▾</span>
          </div>
          <div class="sort-body" id="${s.stableId}">
            ${d?`
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
                ${components?`<span style="font-size:10px;background:var(--surface2);padding:2px 7px;border-radius:10px;color:var(--text2)">${esc(components)}</span>`:''}
                ${duration?`<span style="font-size:10px;background:var(--surface2);padding:2px 7px;border-radius:10px;color:var(--text2)">⏱ ${esc(duration)}</span>`:''}
                ${ritual?`<span style="font-size:10px;background:var(--cg,rgba(200,168,75,.15));padding:2px 7px;border-radius:10px;color:var(--cp)">Rituel</span>`:''}
              </div>
              <p style="font-size:12px;color:var(--text2);line-height:1.6">${esc(desc)}</p>
              ${rolls.length>1?`<div style="margin-top:6px;font-size:11px;color:var(--text3)">Progression: ${rolls.filter(r=>r[1]).map(r=>`Niv.${r[1]}: ${r[0]}`).join(' → ')}</div>`:''}
              ${damage?`<div style="margin-top:6px"><button class="btn bsm" onclick="rollDice('${esc(s.name)}','${esc(damage)}')">🎲 Lancer ${esc(damage)}</button></div>`:''}
            `:'<p style="font-size:12px;color:var(--text3)">Données non disponibles. Chargez le compendium.</p>'}
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function togglePrepareSpell(name){
  const p=P();
  if(!p.spells)return;
  const s=p.spells.find(x=>x.name===name);
  if(s)s.prepared=!s.prepared;
  saveAll();render();
}

let _sortSubTab = 'mes-sorts'; // 'mes-sorts' | 'compendium' | 'apprendre'
let _learnSpellSearch = {q:'',school:''};

function tabSorts(p){
  const hasCaster = (p.classes||[{name:p.classe,level:p.niveau||1}]).some(c=>{
    const d=SRD.classes.find(x=>x.name===c.name); return d&&d.spellcaster;
  });
  if(!hasCaster) return`<div class="panel"><p style="color:var(--text3);font-size:13px">Cette classe n'est pas une classe de sorts.</p></div>`;

  const userIsMJ = isMJ(); // via mjMode — sera connecté aux rôles Firebase
  const magLvl = ((p.classes||[]).find(c=>c.name==='Magicien')||{}).level||0;
  const prepCaster = isPrepCaster(p);

  // Sous-tabs
  const subBar = `<div style="display:flex;gap:6px;margin-bottom:12px">
    <button class="btn${_sortSubTab==='mes-sorts'?' bprimary':''}" onclick="_sortSubTab='mes-sorts';render()" style="flex:1">📖 Mes sorts</button>
    ${userIsMJ?`<button class="btn${_sortSubTab==='compendium'?' bprimary':''}" onclick="_sortSubTab='compendium';render()" style="flex:1">📚 Ajouter (MJ)</button>`:''}
    ${magLvl?`<button class="btn${_sortSubTab==='apprendre'?' bprimary':''}" onclick="_sortSubTab='apprendre';render()" style="flex:1">📜 Apprendre</button>`:''}
  </div>`;

  if(_sortSubTab === 'compendium' && userIsMJ){
    return`<div>${subBar}${renderCompendiumSearch(p)}</div>`;
  }

  if(_sortSubTab === 'apprendre' && magLvl){
    return`<div>${subBar}${renderLearnSpell(p, magLvl)}</div>`;
  }

  // Sous-tab "Mes sorts"
  const allSpells = p.spells||[];
  const knownCount = allSpells.length;
  let prepInfo = '';
  if(prepCaster){
    const intM = p.abilities ? Math.floor((p.abilities[3]-10)/2) : 0;
    const sagM = p.abilities ? Math.floor((p.abilities[4]-10)/2) : 0;
    const chaM = p.abilities ? Math.floor((p.abilities[5]-10)/2) : 0;
    const lvl = (p.classes||[]).reduce((sum,c)=>sum+c.level,0);
    const magC = (p.classes||[]).find(c=>c.name==='Magicien');
    const clericC = (p.classes||[]).find(c=>c.name==='Clerc');
    const druidC = (p.classes||[]).find(c=>c.name==='Druide');
    const paladinC = (p.classes||[]).find(c=>c.name==='Paladin');
    const artificerC = (p.classes||[]).find(c=>c.name==='Artificier');
    let prepMax = 1;
    if(magC) prepMax = Math.max(1, intM + magC.level);
    else if(clericC) prepMax = Math.max(1, sagM + clericC.level);
    else if(druidC) prepMax = Math.max(1, sagM + druidC.level);
    else if(paladinC) prepMax = Math.max(1, chaM + Math.floor(paladinC.level/2));
    else if(artificerC) prepMax = Math.max(1, intM + Math.floor(artificerC.level/2));
    const prepCount = allSpells.filter(s=>{const sp=findSpellData(s.name);return s.prepared&&sp&&sp.level>0;}).length;
    prepInfo = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:var(--surface2);border-radius:8px;font-size:12px">
      <span style="color:var(--text2)">Sorts préparés :</span>
      <strong style="color:${prepCount>prepMax?'#e53935':'#4caf50'};font-size:14px">${prepCount}/${prepMax}</strong>
      <span style="color:var(--text3);font-size:11px">(Cliquez sur un sort pour le préparer / retirer)</span>
    </div>`;
  }

  return`<div>
    ${subBar}
    <div class="panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div class="pt" style="margin-bottom:0">Mes sorts (${knownCount})</div>
      </div>
      ${prepInfo}
      ${renderSpellList(p, false)}
    </div>
  </div>`;
}

function learnSpell(name, level, cost){
  const p = P();
  const cur = p.currency||{pc:0,pa:0,pe:0,po:0,pp:0};
  if((cur.po||0) < cost){
    showToast(`❌ Fonds insuffisants ! Il vous faut ${cost} po (vous avez ${cur.po||0} po)`);
    return;
  }
  if(!p.spells)p.spells=[];
  if(p.spells.find(s=>s.name===name)){showToast('Ce sort est déjà dans votre grimoire.');return;}
  p.spells.push({name,prepared:false,level});
  if(!p.currency)p.currency={pc:0,pa:0,pe:0,po:0,pp:0};
  p.currency.po = (p.currency.po||0) - cost;
  saveAll();render();
  showToast(`✅ "${name}" copié dans votre grimoire ! −${cost} po (2h de travail)`);
}

function addSpellToChar(name){
  const p=P();
  if(!p.spells)p.spells=[];
  const data=findSpellData(name);
  if(!p.spells.find(s=>s.name===name)){
    p.spells.push({name,prepared:false,level:data?data.level:0});
    saveAll();render();
    showToast('✅ '+name+' ajouté !');
  }
}

function removeSpellFromChar(name){
  const p=P();
  if(!p.spells)return;
  p.spells=p.spells.filter(s=>s.name!==name);
  saveAll();render();
  showToast('🗑 '+name+' retiré.');
}

function toggleItemCharge(itemIdx,chargeIdx){
  const p=P();const item=p.inventory[itemIdx];if(!item)return;
  const used=item.chargesUsed||0;
  // Si on clique sur une charge utilisée → récupérer, sinon → dépenser
  if(chargeIdx<used)item.chargesUsed=chargeIdx;
  else item.chargesUsed=Math.min(item.charges,chargeIdx+1);
  render();
}
function addPoolItemToSac(idx){
  const item=mjPool.customItems[idx];if(!item)return;
  const p=P();if(!p.inventory)p.inventory=[];
  p.inventory.push({...item,chargesUsed:0});
  render();showToast(`✓ "${item.name}" ajouté au sac`);
}
function addInvItem(){
  const n=document.getElementById('invName')?.value;const d=document.getElementById('invDesc')?.value;
  if(!n)return;const p=P();if(!p.inventory)p.inventory=[];
  const magic=document.getElementById('invMagic')?.checked||false;
  const linkedTo=document.getElementById('invLinkedTo')?.value||'';
  p.inventory.push({name:n,qty:1,desc:d||'',magic,linkedTo});
  document.getElementById('invName').value='';document.getElementById('invDesc').value='';
  document.getElementById('invMagic').checked=false;document.getElementById('invLinkedTo').value='';
  render();
}
function removeInvItem(i){P().inventory.splice(i,1);render();}
function renderSrdList(q){return[...SRD.weapons,...SRD.armors].filter(i=>!q||i.name.toLowerCase().includes(q.toLowerCase())).slice(0,12).map(i=>`<div class="aci" onclick="addSrdItem('${esc(i.name)}','${esc(i.damage||i.ca||'')}','${esc(i.subtype||i.type||'')}')"><div class="ain">${esc(i.name)}</div><div class="ais">${esc(i.damage||i.ca||'')} — ${esc(i.price||'')}</div></div>`).join('');}
function filterSrdItems(q){const el=document.getElementById('srdList');if(el)el.innerHTML=renderSrdList(q);}
function addSrdItem(name,stats,type){const p=P();if(!p.inventory)p.inventory=[];p.inventory.push({name,qty:1,desc:`${type} — ${stats}`,magic:false,linkedTo:''});render();}

function tabXP(p){
  const cur=p.xp||0;const lvl=totalLevel(p);
  const curT=XP_LEVELS[lvl-1]||0;const nextT=XP_LEVELS[lvl]||XP_LEVELS[19];
  const pct=Math.min(100,Math.round(((cur-curT)/Math.max(1,nextT-curT))*100));
  const toNext=Math.max(0,nextT-cur);const canLvlUp=cur>=nextT&&lvl<20&&!p.pendingLevelUp;

  const xpBar=`<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px">
    <span style="font-size:28px;font-weight:700;color:var(--cp)">${cur.toLocaleString()}</span>
    <span style="color:var(--text3)">XP</span>
  </div>
  <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
  <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${toNext>0?`${toNext.toLocaleString()} XP jusqu'au niveau ${lvl+1}`:'Prêt !'}</div>`;

  const lvlUpBtn=canLvlUp?`<div style="padding:10px;background:var(--cglow);border:1px solid var(--cp);border-radius:8px;text-align:center;margin-bottom:10px">
    <div style="font-size:14px;font-weight:600;color:var(--cp);margin-bottom:6px">⬆ Niveau ${lvl+1} disponible !</div>
    <button class="btn bac" onclick="unlockLevelUp()">Ouvrir montée de niveau</button>
  </div>`:p.pendingLevelUp?`<div style="padding:10px;background:var(--cglow);border:1px solid #ffd54f;border-radius:8px;text-align:center;font-size:13px;color:#ffd54f;margin-bottom:10px">⬆ Voir l'onglet <strong>Niveau +</strong></div>`:'';

  const niveauTable=`<div class="panel"><div class="pt">Table des niveaux</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="color:var(--text3);border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 8px">Niv.</th><th style="text-align:right;padding:4px 8px">XP</th><th style="text-align:right;padding:4px 8px">Maîtrise</th></tr></thead>
      <tbody>${XP_LEVELS.map((xp,i)=>`<tr style="background:${i+1===lvl?'var(--cglow)':'transparent'};border-bottom:1px solid var(--border)">
        <td style="padding:4px 8px;color:${i+1===lvl?'var(--cp)':'var(--text2)'};font-weight:${i+1===lvl?700:400}">${i+1}${i+1===lvl?' ◀':''}</td>
        <td style="text-align:right;padding:4px 8px;color:var(--text3)">${xp.toLocaleString()}</td>
        <td style="text-align:right;padding:4px 8px;color:var(--cp)">+${pb(i+1)}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;

  if(!isMJ()){
    // Mode joueur : barre XP + bouton level up + table
    return`<div class="g2" style="gap:10px">
      <div><div class="panel mb10"><div class="pt">Expérience</div>${xpBar}${lvlUpBtn}</div></div>
      <div>${niveauTable}</div>
    </div>`;
  }

  // Mode MJ : tout + récompenses rapides + ajout XP
  const recompenses=`<div class="panel" style="padding:8px;margin-top:10px">
    <div class="pt" style="font-size:11px">Récompenses rapides</div>
    ${[[10,'Piège désamorcé'],[25,'Gobelin tué'],[50,'Rencontre facile'],[100,'Rencontre moyenne'],[200,'Rencontre difficile'],[450,'Boss tué'],[1000,'Jalon narratif']].map(([xp,lbl])=>`<div class="xp-reward" onclick="quickXP(${xp})">+${xp} XP — ${lbl}</div>`).join('')}
  </div>`;

  return`<div class="g2" style="gap:10px">
    <div>
      <div class="panel mb10">
        <div class="pt" style="display:flex;align-items:center;justify-content:space-between"><span>Expérience</span><span style="font-size:10px;color:var(--cp);border:1px solid var(--cp);border-radius:10px;padding:2px 8px">🎲 MJ</span></div>
        ${xpBar}
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <input class="fi" id="xpAdd" type="number" placeholder="XP à ajouter" min="0">
          <button class="btn bac bsm" style="white-space:nowrap" onclick="addXP()">+ Ajouter</button>
        </div>
        ${lvlUpBtn}
        ${recompenses}
      </div>
    </div>
    <div>${niveauTable}</div>
  </div>`;
}
function removeXP(){const v=parseInt(document.getElementById('xpRemove')?.value)||0;if(v<=0)return;P().xp=Math.max(0,(P().xp||0)-v);document.getElementById('xpRemove').value='';render();}
function addXP(){const v=parseInt(document.getElementById('xpAdd')?.value)||0;if(v<=0)return;P().xp=(P().xp||0)+v;document.getElementById('xpAdd').value='';render();}
function quickXP(xp){P().xp=(P().xp||0)+xp;render();}
function unlockLevelUp(){P().pendingLevelUp=true;setTab('levelup');}
function mjAdjustLevel(delta){
  const p=P();const mc=mainClass(p);if(!mc)return;
  const entry=p.classes.find(c=>c.name===mc.name);if(!entry)return;
  const newLvl=Math.max(1,Math.min(20,entry.level+delta));
  if(newLvl===entry.level)return;
  const dSrd=SRD.classes.find(c=>c.name===mc.name);
  const hd=dSrd?dSrd.hdVal:8;
  const avg=Math.floor(hd/2)+1;
  const conMod=mod(p.abilities[2]);
  // Ajuster PV max proportionnellement
  const diff=newLvl-entry.level;
  p.hpMax=Math.max(1,p.hpMax+diff*Math.max(1,avg+conMod));
  p.hp=Math.min(p.hp,p.hpMax);
  entry.level=newLvl;
  // Mettre l'XP au début du nouveau niveau si on monte, ou à la fin du niveau précédent si on descend
  p.xp=XP_LEVELS[Math.max(0,newLvl-1)]||0;
  p.pendingLevelUp=false;
  render();showToast(`🎲 MJ — Niveau ${mc.name} → ${newLvl}`);
}

let LU={
  step:1,steps:[],choice:null,mcTarget:null,
  asiChoice:null,archetypeChoice:null,styleChoice:null,
  metamagicChoices:[],newSpells:[],
};
function resetLU(){LU={step:1,steps:[],choice:null,mcTarget:null,asiChoice:null,archetypeChoice:null,styleChoice:null,metamagicChoices:[],newSpells:[]};}

// Calcule les étapes nécessaires pour cette montée de niveau
function calcLUSteps(p,className,newClassLevel){
  const cd=CLASS_LEVEL_DATA[className];
  const steps=['direction'];
  if(cd){
    const isASI=cd.asiLevels&&cd.asiLevels.includes(newClassLevel);
    const isArchetype=cd.archetypeLevel===newClassLevel;
    const isStyle=cd.styleLevel===newClassLevel;
    const needSpells=cd.spellcaster&&(cd.spellsPerLevel&&cd.spellsPerLevel[newClassLevel]);
    const isMetamagic=className==='Ensorceleur'&&[3,10,17].includes(newClassLevel);
    const isOrigin=className==='Ensorceleur'&&newClassLevel===1;
    if(isStyle)steps.push('style');
    if(isArchetype||isOrigin)steps.push('archetype');
    if(isASI)steps.push('asi');
    if(needSpells)steps.push('spells');
    if(isMetamagic)steps.push('metamagic');
  }
  steps.push('recap');
  return steps;
}

function tabLevelUp(p){
  const lvl=totalLevel(p);const newLvl=lvl+1;const mc=mainClass(p);
  const stepLabels={direction:'Direction',style:'Style de combat',archetype:'Archétype',asi:'Amélioration',spells:'Sorts',metamagic:'Métamagie',recap:'Confirmation'};

  const displaySteps=LU.steps.length?LU.steps:['direction','recap'];
  const progress=LU.steps.length>1?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px">
    ${displaySteps.map((s,i)=>`<span class="cp-step${i<LU.step-1?' done':i===LU.step-1?' active':''}">${i<LU.step-1?'✓ ':''+(i+1)+'. '}${stepLabels[s]||s}</span>${i<displaySteps.length-1?'<span style="color:var(--text3);font-size:10px;align-self:center">›</span>':''}`).join('')}
  </div>`:'';

  const curStep=LU.steps[LU.step-1]||'direction';
  let content='';
  if(curStep==='direction')content=luStepDirection(p,newLvl,mc);
  else if(curStep==='style')content=luStepStyle(p);
  else if(curStep==='archetype')content=luStepArchetype(p);
  else if(curStep==='asi')content=luStepASI(p);
  else if(curStep==='spells')content=luStepSpells(p);
  else if(curStep==='metamagic')content=luStepMetamagic(p);
  else if(curStep==='recap')content=luStepRecap(p,newLvl);

  return`<div class="creation-wrap"><div class="panel">
    <div class="pt" style="color:#ffd54f;font-size:15px">⬆ Passage au niveau ${newLvl}</div>
    ${progress}
    ${content}
  </div></div>`;
}

function luStepDirection(p,newLvl,mc){
  const isMultiClass=LU.choice==='multiclass';
  return`<div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Ton personnage gagne un niveau ! Comment souhaites-tu progresser ?</p>
    ${mc?`<div class="lu-choice${LU.choice==='continue'?' selected':''}" onclick="LU.choice='continue';renderTab()">
      <h3>📈 Continuer en ${esc(mc.name)}</h3>
      <p>Passer au niveau ${(p.classes.find(c=>c.name===mc.name)||{level:1}).level+1} de ${esc(mc.name)}. Nouvelles capacités garanties.</p>
    </div>`:''}
    <div class="lu-choice${LU.choice==='multiclass'?' selected':''}" onclick="LU.choice='multiclass';LU.mcTarget=null;renderTab()">
      <h3>🔀 Se multiclasser</h3>
      <p>Commencer une nouvelle classe. Les prérequis de caractéristiques s'appliquent.</p>
    </div>
    ${LU.choice==='multiclass'?`<div style="margin-top:12px"><p style="font-size:12px;color:var(--text2);margin-bottom:10px">Choisis la classe (vert = prérequis OK) :</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${SRD.classes.map(c=>{
      const alr=(p.classes||[]).find(cl=>cl.name===c.name);
      const req=checkMcReq(p,c.name);
      return`<div style="background:var(--surface2);border:2px solid ${LU.mcTarget===c.name?'var(--cp)':req.ok?'var(--border)':'var(--border)'};border-radius:8px;padding:10px;cursor:${req.ok?'pointer':'not-allowed'};opacity:${req.ok?1:.4};text-align:center;transition:all .2s" onclick="${req.ok?`LU.mcTarget='${esc(c.name)}';renderTab()`:''}">
        <div style="font-family:var(--F);font-size:12px;color:var(--cp)">${esc(c.name)}</div>
        <div style="font-size:10px;color:var(--text3)">${c.hd}${c.spellcaster?' ✦':''}</div>
        ${alr?`<div style="font-size:10px;color:#4caf50">Niv.${alr.level}</div>`:''}
        ${req.ok?`<div style="font-size:10px;color:#4caf50">✓</div>`:`<div style="font-size:10px;color:#e53935">${req.msg}</div>`}
      </div>`;}).join('')}</div></div>`:''}
    ${LU.choice&&(LU.choice==='continue'||(LU.choice==='multiclass'&&LU.mcTarget))?`<button class="btn bac" style="margin-top:14px;width:100%" onclick="luDirectionNext()">Continuer →</button>`:''}
  </div>`.replace('p_placeholder','');
}

function luDirectionNext(){
  const p=P();const mc=mainClass(p);
  if(LU.choice==='continue'&&mc){
    const entry=p.classes.find(c=>c.name===mc.name);
    const newCLvl=(entry?entry.level:1)+1;
    LU.steps=calcLUSteps(p,mc.name,newCLvl);
  } else if(LU.choice==='multiclass'&&LU.mcTarget){
    LU.steps=['direction','recap'];
  }
  LU.step=2;renderTab();
}

// ── ASI ──
function luStepASI(p){
  const ab=p.abilities||[10,10,10,10,10,10];
  const choice=LU.asiChoice||{type:'double',stats:[],val:1};
  const valid=(choice.type==='asi'&&choice.stats.length===1)||(choice.type==='double'&&choice.stats.length===2);
  return`<div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Amélioration de caractéristiques — Choisis l'une des deux options :</p>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="smb${!LU.asiChoice||LU.asiChoice.type==='double'?' on':''}" onclick="LU.asiChoice={type:'double',stats:[],val:1};renderTab()">+1 à deux stats</button>
      <button class="smb${LU.asiChoice&&LU.asiChoice.type==='asi'?' on':''}" onclick="LU.asiChoice={type:'asi',stats:[],val:2};renderTab()">+2 à une stat</button>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:10px">Maximum 20. Clique sur les caractéristiques à améliorer :</p>
    <div class="g6">
      ${ABILITIES.map((ab_name,i)=>{
        const cur=ab[i];const isSel=choice.stats.includes(i);const atMax=cur>=20;
        const canSel=!isSel&&((choice.type==='double'&&choice.stats.length<2)||(choice.type==='asi'&&choice.stats.length<1));

function applyLevelUp(){
  const p=P();const mc=mainClass(p);
  const isMulti=LU.choice==='multiclass';

  if(isMulti&&LU.mcTarget){
    const ex=p.classes.find(c=>c.name===LU.mcTarget);
    if(ex)ex.level++;else p.classes.push({name:LU.mcTarget,level:1});
    const d=SRD.classes.find(c=>c.name===LU.mcTarget);
    if(d){
      p.weaponProfs=[...new Set([...p.weaponProfs,...(d.weaponTypes||[])])];
      p.armorProfs=[...new Set([...p.armorProfs,...(d.armorTypes||[])])];
    }
    // PV multiclasse
    const dSrd=SRD.classes.find(c=>c.name===LU.mcTarget);
    const avg=dSrd?Math.floor(dSrd.hdVal/2)+1:4;
    p.hpMax+=Math.max(1,avg+mod(p.abilities[2]));p.hp=p.hpMax;
    // Capacités niveau 1 multiclasse
    const newFeats=getLevel1Features(LU.mcTarget);
    newFeats.forEach(f=>{if(!p.features.find(x=>x.name===f.name))p.features.push(f);});
  } else if(mc){
    const entry=p.classes.find(c=>c.name===mc.name);
    if(entry)entry.level++;
    const dSrd=SRD.classes.find(c=>c.name===mc.name);
    const avg=dSrd?Math.floor(dSrd.hdVal/2)+1:4;
    p.hpMax+=Math.max(1,avg+mod(p.abilities[2]));p.hp=p.hpMax;
    // Capacités du nouveau niveau — exclure ASI et les pures mécaniques de compteur
    const newClassLevel=entry?entry.level:1;
    const EXCLUDED_FEATS=[
      'Amélioration de caractéristiques',
      'Points de sorcellerie',
      'Inspiration bardique',
      'Points de ki','Ki',
      'Rage',
      'Forme sauvage',
      'Récupération arcanique',
      'Magie de pacte',
      'Conduit divin',
    ];
    const newFeats=getLevelFeatures(mc.name,newClassLevel)
      .filter(f=>!EXCLUDED_FEATS.some(ex=>f.name.includes(ex)));
    newFeats.forEach(f=>{if(!p.features.find(x=>x.name===f.name))p.features.push(f);});
  }

  // ASI
  if(LU.asiChoice&&LU.asiChoice.stats.length){
    LU.asiChoice.stats.forEach(i=>{p.abilities[i]=Math.min(20,p.abilities[i]+LU.asiChoice.val);});
  }

  // Archétype → ajouter comme capacité
  if(LU.archetypeChoice){
    const cd=mc?CLASS_LEVEL_DATA[mc.name]:null;
    const arch=cd&&cd.archetypes?cd.archetypes.find(a=>a.name===LU.archetypeChoice):null;
    if(arch)p.features.push({name:LU.archetypeChoice,desc:arch.desc,classe:mc?mc.name:''});
  }

  // Style de combat → ajouter comme capacité
  if(LU.styleChoice){
    const cd=mc?CLASS_LEVEL_DATA[mc.name]:null;
    const style=cd&&cd.combatStyles?cd.combatStyles.find(s=>s.name===LU.styleChoice):null;
    if(style)p.features.push({name:'Style : '+LU.styleChoice,desc:style.desc,classe:mc?mc.name:''});
  }

  // Nouveaux sorts
  if(LU.newSpells.length){
    if(!p.spells)p.spells=[];
    LU.newSpells.forEach(name=>{if(!p.spells.find(s=>s.name===name))p.spells.push({name});});
  }

  // Métamagie → ajouter comme capacités
  if(LU.metamagicChoices.length){
    const cd=CLASS_LEVEL_DATA['Ensorceleur'];
    LU.metamagicChoices.forEach(name=>{
      const opt=cd&&cd.metamagicOptions?cd.metamagicOptions.find(o=>o.name===name):null;
      if(opt)p.features.push({name:'Métamagie : '+name,desc:opt.desc,classe:'Ensorceleur'});
    });
  }

  p.pendingLevelUp=false;
  resetLU();
  setTab('perso');
  showToast(`⬆ Niveau confirmé ! ${(p.classes||[]).map(c=>c.name+' '+c.level).join(' / ')} — PV max : ${p.hpMax}`);
}
